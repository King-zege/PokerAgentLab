table:
  size: 2
  small_blind_bb: 0.5
  big_blind_bb: 1.0

players:
  - id: "Human"
    style: "human"
    stack_bb: 100
  - id: "Alice"
    style: "llm"
    llm_style: "balanced"
    stack_bb: 100

session:
  num_hands: 10
  seed: 42
  history_file: "hand_history.jsonl"
  decision_log: "decision_log.txt"
  show_hole_cards: false

# LLM Configuration
# Values can be overridden with environment variables:
# POKER_LLM_API_KEY, POKER_LLM_API_BASE, POKER_LLM_MODEL, POKER_LLM_ENABLED
llm:
  api_key: ""
  api_base: "https://open.bigmodel.cn/api/paas/v4"
  model: "glm-4-flash"
  enabled: false
  use_skills_in_prompt: true
