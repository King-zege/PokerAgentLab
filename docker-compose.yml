services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      POKER_LLM_ENABLED: "false"
      POKER_MEMORY_ENABLED: "true"
      POKER_STRATEGY_RAG_ENABLED: "true"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - api
