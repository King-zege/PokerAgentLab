services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POKER_LLM_ENABLED: "false"
    volumes:
      - ./data:/app/data

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api
